name: Re-index Ghost Help Center

# Keeps the Supabase vector index in sync with the Ghost help center.
on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch: {} # also runnable on-demand from the Actions tab

concurrency:
  group: reindex
  cancel-in-progress: true

jobs:
  reindex:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        # Uses npm ci when a lockfile is present (faster, reproducible),
        # otherwise falls back to npm install.
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install --no-audit --no-fund; fi

      - name: Re-ingest help center
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run ingest

      - name: Upload corpus snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-${{ github.run_id }}
          path: data/corpus.json
          if-no-files-found: ignore
